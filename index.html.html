<meta charset="UTF-8">
<title>Adrescontrole Gemeente Kerkrade</title>

<style>

/* BASIS */
body {
  font-family: Calibri, Arial, sans-serif;
  background-color: #EDEDED;
  margin: 0;
}

/* HEADER */
.header {
  background-color: white;
  padding: 15px 30px;
  border-bottom: 4px solid #A71921;
  display: flex;
  align-items: center;
}

.header img {
  height: 50px;
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 6px;
}

/* TITEL */
h2 {
  color: #A71921;
}

/* LABELS */
label {
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
}

/* INPUT */
input {
  width: 95%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 4px;
  border: 1px solid #ccc;
  font-size: 16px;
}

input:invalid {
  border: 2px solid #A71921;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background-color: #A71921;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 16px;
}

button:hover {
  background-color: #7f141a;
}

/* RESULT */
.result {
  margin-top: 30px;
}

/* MELDINGEN */
.badge {
  padding: 16px;
  border-radius: 6px;
  font-size: 16px;
}

.success {
  background-color: #FBF3F3;
}

.error {
  background-color: #FBF3F3;
}

.warning {
  background-color: #004B6C;
  color: white;
}

</style>

</head>

/* ✅ FUNCTIE */
function checkAdres(){

let postcodeInput = document.getElementById("postcode");
let straatInput = document.getElementById("straat");
let nummerInput = document.getElementById("nummer");

let postcode = postcodeInput.value.toUpperCase().replace(/\s/g,"");
let straat = straatInput.value.toLowerCase().trim();
let nummer = Number(nummerInput.value);

/* ✅ VALIDATIE */
if (!postcode || !straat || !nummerInput.value) {
  document.getElementById("resultaat").innerHTML =
    "<div class='badge warning'> Vul alle velden in.</div>";
  return;
}

/* ✅ POSTCODE CHECK */
if (!/^[0-9]{4}[A-Z]{2}$/.test(postcode)) {
  document.getElementById("resultaat").innerHTML =
    "<div class='badge warning'>⚠️ Vul een geldige postcode in (bijv. 6466HC).</div>";
  return;
}

/* ✅ ZOEKEN */
let match = false;

for (let i = 0; i < data.length; i++) {

  let item = data[i];
  let pc = item.postcode.toUpperCase().replace(/\s/g,"");

  if (
    pc === postcode &&
    item.straat.toLowerCase() === straat &&
    nummer >= item.van &&
    nummer <= item.tot
  ) {
    match = true;
    break;
  }
}

/* ✅ RESULTAAT */
if(match){
  document.getElementById("resultaat").innerHTML =
    "<div class='badge success'>✔ Dit adres valt binnen het Parkstadwet-gebied.</div>";
} else {
  document.getElementById("resultaat").innerHTML =
    "<div class='badge error'>✖ Dit adres valt niet binnen het Parkstadwet-gebied.</div>";
}

}
